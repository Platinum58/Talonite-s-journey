<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <header>
        <h1>Welcome to page 2</h1>

    <form action ="" method = "post">
        <label for="username">username</lable>
        <input type = "text" id="username" placeholder="sfdsj" required minlength="6" maxlength="15">

        <label  for="password">password</lable>
        <input type = "password" id="password" required><br>


        <label  for="email">email</lable>

        <label  for="phone">phone</lable>

        <label  for="bday">bday</lable>
        <input type="date" id="bday"><br>

        <input type="number" id="quantity" min="0" max="99" value="1"><br>

        <label for="title" >title</label>

        <input type="radio" id="Mr" value="Mr" name="title">

            <option value="visa">visa</option>
            <option value = "mastercard">mastercard</option>
        </select><br>

        <label for="subscribe">subscribe</label>
        <input type="checkbox" id="subscribe"><br>
        
        <label for="comment">comment</label>
        <textarea name="comment" rows="3" cols="25" ></textarea>

        <input type ="file" id="file" >
        <input type="reset"><br>
        <input type="submit">
